<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Eventos Corporativos</title>
</head>
<body>

<h1>Eventos em destaque</h1>
<h2>Eventos em Destaque</h2>
<table border="1">
    <thead>
        <tr>
            <th>Evento</th>
            <th>Local</th>
        </tr>
    </thead>
    <tbody>
        {% for e in eventos %}
        <tr>
            <td>{{ e.evento }}</td>
            <td>{{ e.local }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<br>
<a href="{% url 'novo' %}">Cadastrar Novo Registro</a>

</body>
</html>
